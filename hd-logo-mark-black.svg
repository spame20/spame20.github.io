  <line x1="-6" y1="59.4" x2="112" y2="43.6" stroke="#ff4d00" stroke-width="2.6"/>
  <g transform="translate(7,0)">
    <g clip-path="url(#cutTop)" fill="#111008"><use href="#hd"/></g>
  </g>
