<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 107 100" role="img" aria-label="Helen Duque monogram">
  <!-- HD jump-cut monogram · ink version (for light backgrounds) -->
  <defs>
    <clipPath id="cutTop"><polygon points="-10,-5 110,-5 110,42 -10,58"/></clipPath>
    <clipPath id="cutBottom"><polygon points="-10,58 110,42 110,105 -10,105"/></clipPath>
    <g id="hd">
      <rect x="4" y="5" width="13" height="90"/>
      <rect x="31" y="5" width="13" height="90"/>
      <rect x="17" y="44" width="14" height="12"/>
      <rect x="52" y="5" width="13" height="90"/>
      <path fill-rule="evenodd" d="M63,5 H72 C90,5 99,22 99,50 C99,78 90,95 72,95 H63 Z M65,19 H71 C82,19 86,31 86,50 C86,69 82,81 71,81 H65 Z"/>
    </g>
